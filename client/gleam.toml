name = "client"
version = "0.1.0"
description = "Vanishing Ink Lustre SPA. Compiles to JavaScript and is served as a static bundle by the BEAM server."
target = "javascript"

[javascript]
runtime = "nodejs"

# Foundation-milestone deviation: the quest also named `lustre_http`, but
# `lustre_http` 1.0.0 (the only published version at time of writing) calls
# `gleam/result.then`, which was removed from `gleam_stdlib`. Pinning a
# pre-removal stdlib would fix the build but downgrades every other
# dependency along with it. The dependency is deferred until either
# `lustre_http` ships a stdlib-compatible release or the first quest that
# actually needs HTTP calls from the client lands and can justify the
# downgrade trade-off.
[dependencies]
gleam_stdlib = ">= 0.60.0 and < 2.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
lustre = ">= 5.0.0 and < 6.0.0"
shared = { path = "../shared" }

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.0.0 and < 3.0.0"

# HTML shell + dev-server config consumed by `lustre_dev_tools`. The
# stylesheet href resolves under the project's `assets/` directory at
# dev time and is copied into the dist bundle on `gleam run -m
# lustre/dev build`, so the same path works for both flows.
[tools.lustre.html]
title = "Vanishing Ink"

[[tools.lustre.html.stylesheets]]
href = "/styles.css"

# OpenDyslexic loaded as a `<link rel="stylesheet">` rather than an
# `@import` inside `styles.css`. Per the CSS Cascading and Inheritance
# specification, `@import` rules must precede every other at-rule and
# style rule; an `@import` placed after the existing `:root` /
# `body.vi-light-mode` / `body.vi-reduced-motion` blocks is silently
# invalidated by the browser. A second stylesheet `<link>` has no
# ordering constraint, so the font loads reliably and the
# `.vi-dyslexia-font` body-class toggle actually swaps the font family.
[[tools.lustre.html.stylesheets]]
href = "https://fonts.googleapis.com/css2?family=OpenDyslexic:wght@400;700&display=swap"

# Dev-server network config. `0.0.0.0` allows connections from other
# devices on the LAN — needed for iPhone testing via the machine's
# local IP. Switch back to `"localhost"` to restrict to local-only.
[tools.lustre.dev]
host = "0.0.0.0"
