app = "vanishing-ink"
primary_region = "iad"  # placeholder — change at launch time

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  STATIC_DIR = "/app/static"
  DATABASE_PATH = "/data/vanishing_ink.db"

[[mounts]]
  source = "vanishing_ink_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
